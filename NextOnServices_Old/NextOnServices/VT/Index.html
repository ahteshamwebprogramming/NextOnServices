    <script type="text/javascript">
        jQuery(document).ready(function () {
            $("#btnsave").click(function () {
                var hardware = Device();
                $('#hfdevice').val(hardware);
                var UN = $('#UN').val();
                var PWD = $('#PWD').val();
                //   alert('Welcome');
                $.ajax({
                    type: "POST",
                    contentType: "application/json; charset=utf-8",
                    url: 'UserProfile.aspx/checkuser',
                    data: JSON.stringify({ username: UN, password: PWD, Device: hardware }),
                    cache: false,
                    dataType: "json",

                    success: function (result) {

                        if (result.d == "1") {
                            alert("Usercannot be left blank");
                        }
                        else if (result.d == "2")
                            alert("Password Cannot be left blank");
                        else if (result.d == "4") {
                            alert("Username or password is incorrect");
                        }
                        else if (result.d == "3") {
                            var url = "Dashboard.aspx";
                            window.location.href = url;
                        }


                        // alert(data);
                    },
                    error: function (result) {
                        alert('Error');
                    }
                });
